name: Index URL from Issue

on:
  issues:
    types: [opened]

jobs:
  index:
    if: startsWith(github.event.issue.title, 'http') || startsWith(github.event.issue.title, 'reindex ')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initial acknowledgment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Hi! I'm starting to process your request. I'll let you know once the indexing is complete. ⚙️"
            });

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run indexer
        id: indexer
        run: |
          URL="${{ github.event.issue.title }}"
          USER="${{ github.event.issue.user.login }}"
          node scripts/index-url.js "$URL" "$USER"
          node scripts/generate-index.js

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Index update: ${{ github.event.issue.title }}"
          file_pattern: "src/docs/** src/data/search-index.json"
          add_options: "--force"

      - name: Comment and close issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;
            const user = context.payload.issue.user.login;
            const url = context.payload.issue.title;
            const isWildcard = url.endsWith('*');
            const isReindex = url.startsWith('reindex ');
            const origin = "https://mdpedia.inled.es";
            
            let body = "Hi @" + user + "! ";
            body += isReindex ? "Index update completed. 🛠️\n\n" : "Indexing completed successfully. 🚀\n\n";
            
            if (isWildcard || isReindex) {
                const cleanUrl = url.replace('reindex ', '').replace('*', '');
                const urlObj = new URL(cleanUrl);
                const domain = urlObj.hostname;
                const pathname = urlObj.pathname === '/' ? '' : urlObj.pathname;
                const indexPath = "doc/" + domain + pathname + "/_index";
                const rawPath = "raw/" + domain + pathname + "/_index.md";
                
                body += "Processed indices for the domain **" + domain + "**.\n\n" +
                        "- 📚 **Domain Index**: [" + indexPath + "](" + origin + "/" + indexPath + ")\n" +
                        "- 🤖 **Raw AI Index**: " + origin + "/" + rawPath + "\n";
            } else {
                const urlObj = new URL(url);
                const domain = urlObj.hostname;
                const pathname = urlObj.pathname === '/' ? '/index' : urlObj.pathname;
                const rawPath = "raw/" + domain + pathname + ".md";
                const docPath = "doc/" + domain + pathname;
                
                body += "- 📖 **Human View**: [" + docPath + "](" + origin + "/" + docPath + ")\n" +
                        "- 🤖 **Raw for AI Agents**: " + origin + "/" + rawPath + "\n\n";
            }
            
            body += "*Note: It might take a couple of minutes to be available while the new version is deployed.*";

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: body
            });
            
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              state: 'closed'
            });
